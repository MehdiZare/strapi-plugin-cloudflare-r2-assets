# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release Prepare

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    if: >-
      github.event.pull_request.merged == true
      && (contains(github.event.pull_request.labels.*.name, 'release:patch')
          || contains(github.event.pull_request.labels.*.name, 'release:minor')
          || contains(github.event.pull_request.labels.*.name, 'release:major'))
      && !startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged PR commit
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Determine bump type from labels
        id: bump
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          COUNT=0
          TYPE=""
          for LEVEL in major minor patch; do
            if echo "$LABELS" | grep -q "\"release:${LEVEL}\""; then
              COUNT=$((COUNT + 1))
              TYPE="$LEVEL"
            fi
          done
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::Exactly one release label required (found $COUNT): release:patch|minor|major"
            exit 1
          fi
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version
        run: npm version "${{ steps.bump.outputs.type }}" --no-git-tag-version

      - name: Update lockfile with new version
        run: bun install

      - name: Read new version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Verify no existing tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Build
        run: bun run build

      - name: Verify release artifacts
        run: npm run check:artifacts

      - name: Create release branch and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v${{ steps.version.outputs.version }}"
          git add -f package.json bun.lock dist/
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"
          git push origin "release/v${{ steps.version.outputs.version }}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "release/v${{ steps.version.outputs.version }}" \
            --title "chore(release): v${{ steps.version.outputs.version }}" \
            --body "Automated release PR for v${{ steps.version.outputs.version }}." \
            --label "release:${{ steps.bump.outputs.type }}"

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "release/v${{ steps.version.outputs.version }}" \
            --auto --merge
