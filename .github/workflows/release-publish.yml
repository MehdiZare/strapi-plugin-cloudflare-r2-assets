# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release Publish

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  publish-release:
    if: >-
      github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Create and push annotated tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "chore(release): ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to npm
        run: |
          PKG_NAME=$(node -p 'require("./package.json").name')
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null; then
            echo "${PKG_NAME}@${VERSION} already published — skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack npm tarball
        run: npm pack

      - name: Archive dist folder
        run: tar -czf "dist-v${{ steps.version.outputs.version }}.tar.gz" dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "${TAG}" &>/dev/null; then
            echo "Release ${TAG} already exists — skipping"
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "Automated release" \
              *.tgz \
              "dist-v${{ steps.version.outputs.version }}.tar.gz"
          fi

      - name: Delete release branch
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${BRANCH_REF}"
