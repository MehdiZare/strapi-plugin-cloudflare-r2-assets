# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release Tag

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  label-release:
    if: >-
      github.event.pull_request.merged == true
      && (contains(github.event.pull_request.labels.*.name, 'release:patch')
          || contains(github.event.pull_request.labels.*.name, 'release:minor')
          || contains(github.event.pull_request.labels.*.name, 'release:major'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Determine bump type from labels
        id: bump
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"release:major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version
        run: npm version "${{ steps.bump.outputs.type }}" --no-git-tag-version

      - name: Update lockfile with new version
        run: bun install

      - name: Read new version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Verify no existing tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Build
        run: bun run build

      - name: Verify release artifacts
        run: npm run check:artifacts

      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f package.json bun.lock dist/
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"

      - name: Create annotated tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" \
            -m "chore(release): v${{ steps.version.outputs.version }}"

      - name: Push release commit and tag
        run: git push origin main --follow-tags

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack npm tarball
        run: npm pack

      - name: Archive dist folder
        run: tar -czf "dist-v${{ steps.version.outputs.version }}.tar.gz" dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Automated release" \
            *.tgz \
            "dist-v${{ steps.version.outputs.version }}.tar.gz"
